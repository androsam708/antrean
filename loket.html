<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Antrean - Panel Loket</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input, button { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        select:focus, input:focus { border-color: #3498db; outline: none; }
        button { background-color: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .status-box { margin-top: 20px; padding: 15px; background: #e8f4f8; border-left: 5px solid #3498db; border-radius: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panggil Antrean (Panel Loket)</h2>
    
    <div class="form-group">
        <label for="pilihLoket">Pilih Loket:</label>
        <select id="pilihLoket" onchange="cekStatusLoket()">
            <option value="Loket_A_1">Loket A / 1</option>
            <option value="Loket_B_2">Loket B / 2</option>
            <option value="Loket_C_3">Loket C / 3</option>
            <option value="Loket_D_4">Loket D / 4</option>
            <option value="Loket_E_5">Loket E / 5</option>
            <option value="Loket_F_6">Loket F / 6</option>
            <option value="Loket_G_7">Loket G / 7</option>
            <option value="Loket_H_8">Loket H / 8</option>
            <option value="Loket_I_9">Loket I / 9</option>
            <option value="Loket_J_10">Loket J / 10</option>
        </select>
    </div>

    <div class="form-group">
        <label for="nomorAntrean">Input Nomor Antrean:</label>
        <input type="number" id="nomorAntrean" placeholder="Contoh: 105" min="1">
    </div>

    <button onclick="updateAntreanManual()">Update Nomor Ini</button>

    <div class="status-box" id="statusBox">
        <span id="statusTeks">Memuat status antrean...</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://antrean-loket-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataLoketLokal = {};

    db.ref('dataAntrean').on('value', (snapshot) => {
        dataLoketLokal = snapshot.val() || {};
        cekStatusLoket();
    });

    function cekStatusLoket() {
        let loketTerpilih = document.getElementById('pilihLoket').value;
        let nomor = "-";
        if (dataLoketLokal && dataLoketLokal[loketTerpilih] !== undefined) {
            nomor = dataLoketLokal[loketTerpilih];
        }
        let namaTampilan = loketTerpilih.replace(/_/g, ' ');
        document.getElementById('statusTeks').innerHTML = `<strong>${namaTampilan}</strong> saat ini melayani Nomor: <strong>${nomor}</strong>`;
    }

    function updateAntreanManual() {
        let loketTerpilih = document.getElementById('pilihLoket').value;
        let nomorInput = document.getElementById('nomorAntrean').value;

        if (nomorInput === "" || nomorInput < 1) {
            alert("Silakan masukkan nomor antrean yang valid!");
            return;
        }

        // Paksa kirim sebagai teks agar aman
        let nomorTeks = String(nomorInput);
        db.ref('dataAntrean/' + loketTerpilih).set(nomorTeks);

        db.ref('hitunganKerjaLoket/' + loketTerpilih).transaction((currentValue) => {
            return (currentValue || 0) + 1;
        });

        document.getElementById('nomorAntrean').value = ""; 
    }
</script>
</body>
</html>
